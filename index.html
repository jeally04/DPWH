<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG IN</title>
    <link type="text/css" rel="stylesheet" href="./styles/login.css">
    <script src="https://kit.fontawesome.com/90f0a938cd.js" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const loginForm = document.getElementById('loginForm');
            const errorMessageElement = document.querySelector('.signin-error-message');

            loginForm.addEventListener('submit', async function (event) {
                event.preventDefault();
                const formData = new FormData(loginForm);

                try {
                    const response = await fetch('./Functions/signin.php', {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();
                    console.log(result);  // Log the result to see if login was successful

                    if (result.success) {
                        console.log('Login successful, navigating to Contents/home.php');
                        window.history.pushState(null, '', 'home.php');
                        window.location.href = './Contents/home.php';
                    } else {
                        console.log('Login failed:', result.message);
                        errorMessageElement.textContent = result.message;
                        errorMessageElement.style.display = 'block';
                    }
                } catch (error) {
                    console.error('Error during login:', error);
                }
            });
        });
    </script>
</head>

<body>
    <section class="imp">
        <section>
            <div class="login show" id="one">
                <div class="textbox slide-left2">
                    <div class="head">
                        <img class="logo1" src="./image/logo.png" alt="Logo" />
                    </div>
                    <form id="loginForm" method="post">
                        <div class="signin-error-message" style="display: none;"></div>
                        <input type="text" name="username" placeholder="Username" required>
                        <input type="password" name="password" placeholder="Password" required>
                        <button type="submit">LOG IN</button>
                    </form>
                </div>
            </div>
            <div class="sec show" id="two">
                <div class="textbox slide-left">
                    <div class="text">INFORMATION AND COMMUNICATION TECHNOLOGY STAFF </div>
                    <div class="vis">VISION</div>
                    <div class="context">100% end user satisfaction throught realiable IT infrastructure and support services. <br></div>
                    <div class="mis">MISSION</div>
                    <div class="context">To provide adequate and scalable infrastructure and dynamic support services.</div>
                </div>
            </div>
        </section>
        
    <script src="./Scripts/main.js"></script>
</body>

</html>
